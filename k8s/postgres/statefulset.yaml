        ('What is the purpose of /etc/fstab?', 'List of user accounts', 'Filesystem mount configuration at boot', 'Network interface configuration', 'System log rotation config', 'B', '/etc/fstab defines how disk partitions are mounted at startup.', 'medium'),
        ('Which command finds files modified in the last 7 days?', 'find / -mtime -7', 'locate -d 7', 'ls -t --days=7', 'grep -r --days 7', 'A', 'find with -mtime -7 finds files modified less than 7 days ago.', 'medium'),
        ('What does "sudo !!" do?', 'Runs the sudo command twice', 'Re-runs the last command with sudo', 'Cancels the last sudo command', 'Shows sudo history', 'B', '!! expands to the last command, so sudo !! re-runs it with elevated privileges.', 'hard'),
        ('Which file contains user password hashes in modern Linux?', '/etc/passwd', '/etc/shadow', '/etc/security', '/etc/auth', 'B', '/etc/shadow stores hashed passwords and is readable only by root.', 'medium'),
