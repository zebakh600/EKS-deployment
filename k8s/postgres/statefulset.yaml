        ('What is an exporter in Prometheus?', 'A dashboard export tool', 'A process that exposes metrics from a system for scraping', 'A Prometheus backup agent', 'An alerting component', 'B', 'Exporters translate metrics from third-party systems into Prometheus format.', 'medium'),
        ('What are the four core metric types in Prometheus?', 'Int, Float, String, Boolean', 'Counter, Gauge, Histogram, Summary', 'Rate, Average, Sum, Count', 'Push, Pull, Stream, Batch', 'B', 'Prometheus has four metric types: Counter, Gauge, Histogram, and Summary.', 'medium'),
