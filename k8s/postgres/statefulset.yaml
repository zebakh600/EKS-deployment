        ('What is the purpose of Grafana provisioning?', 'Providing Grafana licenses', 'Automatically configuring data sources and dashboards via config files', 'Provisioning cloud servers', 'Setting up user accounts in bulk', 'B', 'Provisioning configures Grafana data sources and dashboards automatically via YAML/JSON on startup.', 'hard')
    ) AS q(question_text, option_a, option_b, option_c, option_d, correct_option, explanation, difficulty)
    WHERE t.slug = 'grafana';

    INSERT INTO questions (topic_id, question_text, option_a, option_b, option_c, option_d, correct_option, explanation, difficulty)
    SELECT t.id, q.question_text, q.option_a, q.option_b, q.option_c, q.option_d, q.correct_option, q.explanation, q.difficulty
    FROM topics t, (VALUES
        ('What is Continuous Integration (CI)?', 'Integrating with cloud providers continuously', 'Automatically building and testing code on every commit', 'Continuously deploying to production', 'Monitoring integration between services', 'B', 'CI is the practice of frequently merging code changes, triggering automated builds and tests.', 'easy'),
        ('What is the difference between Continuous Delivery and Continuous Deployment?', 'They are the same', 'Delivery requires manual approval; Deployment deploys automatically to production', 'Deployment requires manual approval; Delivery is automated', 'Delivery is for staging; Deployment is for development', 'B', 'Continuous Delivery needs manual approval. Continuous Deployment goes all the way automatically.', 'medium'),
        ('What is a deployment pipeline?', 'A network pipe for deployments', 'An automated sequence of steps from code commit to production', 'A Jenkins plugin', 'A type of Git branch', 'B', 'A deployment pipeline automates the path from version control through build, test, and deployment.', 'easy'),
        ('What is a "blue-green deployment"?', 'Using blue and green as UI themes', 'Running two identical environments and switching traffic between them', 'A Kubernetes rolling update strategy', 'A multi-region deployment pattern', 'B', 'Blue-green maintains two identical environments and switches traffic for zero-downtime releases.', 'medium'),
        ('What is a canary deployment?', 'Deploying to a test environment', 'Gradually rolling out a release to a small subset of users first', 'A hotfix deployment strategy', 'A rollback mechanism', 'B', 'Canary releases send a small percentage of traffic to the new version first before full rollout.', 'medium'),
        ('What is "shift left" in DevOps?', 'Moving teams to the left side of the org chart', 'Moving testing and security earlier in the development lifecycle', 'Using left-to-right pipeline flow', 'Shifting on-call responsibility left', 'B', 'Shift left means performing testing and security checks earlier in development.', 'medium'),
        ('What is infrastructure as code (IaC)?', 'Writing code for cloud functions', 'Managing infrastructure through machine-readable definition files', 'Code that runs infrastructure processes', 'An AWS-specific tool', 'B', 'IaC lets you define and manage cloud infrastructure using code like Terraform.', 'easy'),
        ('What is a feature flag?', 'A Git branch flag', 'A mechanism to enable/disable features in production without deploying', 'A flag in CI config', 'A code review checkbox', 'B', 'Feature flags toggle features on/off at runtime without new deployments.', 'medium'),
        ('What is mean time to recovery (MTTR)?', 'Average time between releases', 'Average time to restore service after an incident', 'Time to run full test suite', 'Mean time to resolve PRs', 'B', 'MTTR measures the average time to recover from a failure — a key DORA metric.', 'hard')
    ) AS q(question_text, option_a, option_b, option_c, option_d, correct_option, explanation, difficulty)
    WHERE t.slug = 'cicd';
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: devops-quiz
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: devopsquiz
        - name: POSTGRES_USER
          value: quizuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: app-secrets, key: DB_PASSWORD }
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests: { cpu: 200m, memory: 256Mi }
          limits:   { cpu: 500m, memory: 512Mi }
      volumes:
      - name: init-sql
        configMap: { name: postgres-sql-init }
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: gp2
      resources:
        requests: { storage: 5Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: devops-quiz
spec:
  selector: { app: postgres }
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None