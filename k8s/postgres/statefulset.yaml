        ('What does the "rate()" function do in PromQL?', 'Returns total count', 'Calculates per-second rate of a counter over a time range', 'Converts gauge to counter', 'Rounds metric values', 'B', 'rate() calculates the per-second average rate of increase of a counter.', 'hard'),
