        ('What is Grafana primarily used for?', 'Log storage', 'Visualization and monitoring dashboards for metrics data', 'Container orchestration', 'CI/CD pipeline management', 'B', 'Grafana is an open-source platform for monitoring and observability dashboards.', 'easy'),
