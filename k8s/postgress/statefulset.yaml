apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-sql-init
  namespace: devops-quiz
data:
  # Copy content of postgres-init/01_schema.sql here
  01_schema.sql: |
    -- paste full content of postgres-init/01_schema.sql
  02_seed.sql: |
    -- paste full content of postgres-init/02_seed.sql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: devops-quiz
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: devopsquiz
        - name: POSTGRES_USER
          value: quizuser
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef: { name: app-secrets, key: DB_PASSWORD }
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-sql
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests: { cpu: 200m, memory: 256Mi }
          limits:   { cpu: 500m, memory: 512Mi }
      volumes:
      - name: init-sql
        configMap: { name: postgres-sql-init }
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests: { storage: 5Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: devops-quiz
spec:
  selector: { app: postgres }
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None
